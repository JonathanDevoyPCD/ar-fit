services:
  - type: web
    name: ar-fit-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SESSION_COOKIE_NAME
        value: arfit_session
      - key: SESSION_TTL_DAYS
        value: 30
      - key: OTP_TTL_MINUTES
        value: 10
      - key: OTP_MAX_ATTEMPTS
        value: 5
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_API_URL
        value: https://api.resend.com/emails
